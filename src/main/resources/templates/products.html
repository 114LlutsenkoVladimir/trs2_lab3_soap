<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div th:replace="header :: header"></div>

<div class="container">

<form th:action="@{/products/by-category}" method="get">
    <label>Category ID:</label>
    <select name="categoryId" required>
        <option th:each="c : ${categories}"
                th:value="${c.id}"
                th:text="${c.name}"
                th:selected="${c.id == selectedCategoryId}">
        </option>
    </select>
    <button type="submit">Search</button>
</form>

<form th:action="@{/products/by-manufacturer}" method="get">
    <label>Manufacturer ID:</label>
    <select name="manufacturerId" required>
        <option th:each="m : ${manufacturers}"
                th:value="${m.id}"
                th:text="${m.name}"
                th:selected="${m.id == selectedManufacturerId}">
        </option>
    </select>
    <button type="submit">Search</button>
</form>

<form th:action="@{/products/by-price}" method="get">
    <label>Price from:</label>
    <input type="number" step="0.01" name="priceStart" required>

    <label>to:</label>
    <input type="number" step="0.01" name="priceEnd" required>

    <button type="submit">Search</button>
</form>

    <!-- MySQL -->
    <div>
        <h2>MySQL</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${mysqlProducts}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- PostgreSQL -->
    <div>
        <h2>PostgreSQL</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${postgresProducts}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
