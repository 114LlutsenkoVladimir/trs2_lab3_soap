<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="container">
        <!-- MySQL Category -->
        <div>
            <h2>MySQL Categories</h2>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${mysqlCategories}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- PostgreSQL Category -->
        <div>
            <h2>PostgreSQL Categories</h2>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${postgresCategories}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
